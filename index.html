<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcelo & Roseli | Casamento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
--gold:#d4af37;
--gold-soft:#f5e6b8;
--bg1:#fffaf3;
--bg2:#f1ebe3;
--dark:#2b2b2b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Montserrat,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--dark);overflow-x:hidden;scroll-behavior:smooth}
img{max-width:100%;height:auto}

/* INTRO */
#intro{position:fixed;inset:0;background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486") center/cover no-repeat;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:9999}
#intro h1{font-family:'Playfair Display',serif;font-size:3rem;letter-spacing:3px;margin:15px 0;text-shadow:0 0 15px rgba(212,175,55,.8)}
#enterBtn{padding:14px 30px;border-radius:30px;border:none;background:var(--gold);color:white;font-weight:600;cursor:pointer;margin-top:20px;box-shadow:0 5px 15px rgba(0,0,0,.3)}

/* RINGS */
.rings{position:relative;width:180px;height:120px;margin-bottom:20px}
.ring-img{position:absolute;width:95px;animation:ringSpin 14s linear infinite;filter:drop-shadow(0 0 12px rgba(212,175,55,.8))}
.ring-img.left{left:0;top:20px}
.ring-img.right{right:0;top:20px;animation-direction:reverse}
@keyframes ringSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* BOKEH */
.bokeh{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--gold-soft);opacity:.8;filter:blur(2px);animation:bokehFloat linear forwards}
@keyframes bokehFloat{0%{transform:translateY(110vh) scale(.5)}100%{transform:translateY(-10vh) scale(1.3);opacity:0}}

/* NAV */
nav{position:fixed;top:0;width:100%;background:white;display:flex;justify-content:center;gap:25px;padding:12px;box-shadow:0 6px 15px rgba(0,0,0,.08);z-index:100}
nav a{text-decoration:none;color:#444;font-weight:600}

/* HERO */
header{height:100vh;background:url("https://images.unsplash.com/photo-1519741497674-611481863552") center/cover no-repeat;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;color:white}
header::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.45)}
.hero{position:relative;z-index:2;padding:20px}
.hero h1{font-family:'Playfair Display',serif;font-size:4rem;margin:0;text-shadow:0 0 15px rgba(212,175,55,.7)}
.hero p{font-size:1.2rem}
.countdown{font-size:1.8rem;margin-top:20px;font-weight:600}

section{padding:110px 20px;max-width:1100px;margin:auto}
.title{font-family:'Playfair Display',serif;font-size:2.4rem;text-align:center;margin-bottom:50px}

/* GALERIA */
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.gallery img{border-radius:12px;cursor:pointer;transition:.4s;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.gallery img:hover{transform:scale(1.05)}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:9998}
#lightbox img{max-width:90%;max-height:90%;border-radius:10px}

/* HISTÓRIA */
.timeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px}
.timeline div{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,.1);text-align:center}
.timeline img{border-radius:10px;margin-bottom:15px}

/* RSVP */
form{display:flex;flex-direction:column;gap:12px;max-width:420px;margin:auto}
input,textarea{padding:11px;border-radius:6px;border:1px solid #ccc}
button{background:var(--gold);border:none;padding:12px 20px;color:white;border-radius:6px;cursor:pointer}

footer{background:#eee;text-align:center;padding:40px 20px;margin-top:60px;font-style:italic}

/* PETALS */
.petal{position:fixed;top:-20px;width:12px;height:16px;background:#b30000;border-radius:60%;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

/* SPARKS */
.spark{position:fixed;bottom:-10px;width:4px;height:4px;background:var(--gold);border-radius:50%;box-shadow:0 0 10px var(--gold);animation:floatSpark 10s linear forwards}
@keyframes floatSpark{0%{transform:translateY(0)}100%{transform:translateY(-120vh);opacity:0}}

/* Responsividade extra */
@media(max-width:800px){
  .hero h1{font-size:2.4rem}
  .hero p{font-size:1rem}
  .countdown{font-size:1.2rem}
}
@media(max-width:500px){
  .gallery{grid-template-columns:1fr}
  .timeline{grid-template-columns:1fr}
}
</style>
</head>
